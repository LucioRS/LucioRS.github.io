<a class="skip-link" href="#main-content">{{ i18n "skip_to_content" }}</a>
<header class="site-header">
  <div class="container site-header__inner">
    <a class="site-brand" href="{{ "/" | relLangURL }}">Lucio R. Salinas</a>
    <nav class="site-nav" aria-label="Primary">
      {{ range site.Menus.main }}
        <a href="{{ .URL | relLangURL }}" {{ if or ($.IsMenuCurrent "main" .) ($.HasMenuCurrent "main" .) }}class="is-active"{{ end }}>{{ .Name }}</a>
      {{ end }}
    </nav>
    <div class="site-header__actions">
      <div class="lang-switch" aria-label="Language">
        {{ range .AllTranslations }}
          <a href="{{ .RelPermalink }}" class="{{ if eq .Language.Lang $.Site.Language.Lang }}is-active{{ end }}">{{ .Language.LanguageName }}</a>
        {{ end }}
      </div>
      <button class="theme-toggle" type="button" data-theme-toggle aria-label="{{ i18n "theme_toggle" }}">
        <span>◐</span>
      </button>
    </div>
  </div>
</header>
