baseURL = 'https://luciosalinas.com/'
title = 'Lucio R. Salinas'
defaultContentLanguage = 'es'
defaultContentLanguageInSubdir = false
enableRobotsTXT = true
disableKinds = ['taxonomy', 'term']

[pagination]
  pagerSize = 12

[caches]
  [caches.images]
    dir = ':cacheDir/images'

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = false

[sitemap]
  changefreq = 'weekly'
  priority = 0.7
  filename = 'sitemap.xml'

[params]
  author = 'Lucio R. Salinas'
  customDomain = 'luciosalinas.com'
  repoURL = 'https://github.com/LucioRS/LucioRS.github.io'
  githubProfile = 'https://github.com/LucioRS'
  scholarURL = 'https://scholar.google.com/citations?user=uvQiD80AAAAJ'
  orcidURL = 'https://orcid.org/0000-0002-7330-4131'
  linkedinURL = 'https://www.linkedin.com/in/lucio-r-salinas/'
  mainSections = ['publications']

