person:
  name: Lucio R. Salinas
  tagline:
    es: Robótica, teleoperación y control automático para sistemas no tripulados
    en: Robotics, teleoperation, and automatic control for uncrewed systems
  summary:
    es: Investigador Independiente del CONICET y docente de la Universidad Nacional de San Juan. Su trabajo se centra en robótica, teleoperación, control automático, interacción humano-robot, vehículos no tripulados, sistemas multi-agente, gemelos digitales, modelado y simulación, y desarrollo de software.
    en: Independent Researcher at CONICET and lecturer at the National University of San Juan. His work focuses on robotics, teleoperation, automatic control, human-robot interaction, uncrewed vehicles, multi-agent systems, swarm robotics, digital twinning, modelling and simulation, and software development.
